services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: finanzas
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: finanzas
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://finanzas:${DB_PASSWORD}@db:5432/finanzas
    depends_on:
      - db
    volumes:
      - ./credentials:/app/credentials
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./frontend/dist:/srv
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:

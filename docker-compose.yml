services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: finanzas
      POSTGRES_PASSWORD: finanzas
      POSTGRES_DB: finanzas
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://finanzas:finanzas@db:5432/finanzas
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - ./credentials:/app/credentials
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
